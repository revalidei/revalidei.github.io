<!DOCTYPE html>
<html lang="pt-BR">
<head>
<link rel="stylesheet" href="../css/app.css">
<link rel="stylesheet" href="../css/layout.css">
<meta name="apple-mobile-web-app-capable" content="yes">

<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<meta name="apple-mobile-web-app-title" content="Revalida">

<meta name="mobile-web-app-capable" content="yes">

<link rel="manifest" href="../manifest.json">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Histórico de Evolução</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body.page-shell{background:#0f1115;color:white;font-family:Inter,Arial,sans-serif;}
.page-inner{max-width:900px;margin:0 auto;padding:var(--page-pad,20px);padding-top:calc(env(safe-area-inset-top) + 20px);}
.titulo{font-size:clamp(1.25rem,4vw,1.75rem);margin-bottom:25px;color:#7CFFB2;}
canvas{max-width:100%;}
html, body {
  height: 100%;
  overflow-y: scroll; /* rolagem funcional */
}

body::-webkit-scrollbar {
  display: none;
}

body {
  scrollbar-width: none; /* Firefox */
}
</style>
<style>html.auth-pending body{visibility:hidden}</style>
<script type="module" src="../js/auth-guard.js"></script>
</head>
<body class="page-shell">
<div class="page-inner">
<h1 class="titulo">📈 Histórico de Evolução</h1>
<canvas id="graficoEvolucao" style="max-width:100%;width:min(600px,100%);margin:auto;display:block;"></canvas>

<script>
let provas = JSON.parse(localStorage.getItem("provas_salvas")) || [];

// Ordena pelo timestamp
provas.sort((a,b)=> new Date(a.data) - new Date(b.data));

let labels = provas.map(p=>p.data);
let porcentagens = provas.map(p=>parseFloat(p.porcentagem));

const ctx = document.getElementById('graficoEvolucao').getContext('2d');
new Chart(ctx, {
    type: 'line',
    data: {
        labels: labels,
        datasets: [{
            label: 'Aproveitamento (%)',
            data: porcentagens,
            fill: false,
            borderColor: '#7CFFB2',
            tension: 0.3
        }]
    },
    options: {
        scales: {
            y: { beginAtZero: true, max: 100 }
        }
    }
});
</script>
</div>
<script src="../js/app.js"></script>
</body>
</html>
