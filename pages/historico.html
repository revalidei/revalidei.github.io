<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#020617">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Revalida">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="../manifest.json">
<title>Histórico • Revalida</title>
<link rel="stylesheet" href="../css/app.css">
<link rel="stylesheet" href="../css/layout.css">
<link rel="stylesheet" href="../css/pages.css">
<link rel="stylesheet" href="../css/icons.css">
<link rel="stylesheet" href="../css/historico.css">
<script src="../js/icons.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="../js/historico-store.js"></script>
<style>html.auth-pending body{visibility:hidden}</style>
<script type="module" src="../js/auth-guard.js"></script>
</head>
<body class="page-shell page-historico">
<div class="page-container historico-wrap">

<header class="historico-topo">
<div>
<h1 class="icon-wrap">
<span data-icon="bar-chart" data-icon-size="26" data-icon-class="icon--accent"></span>
Histórico de estudos
</h1>
<p id="historicoSubtitulo">Carregando…</p>
</div>
<a href="../dashboard.html" class="btn-voltar-hist icon-wrap">
<span data-icon="chevron-left" data-icon-size="18"></span>
Voltar
</a>
</header>

<nav class="historico-tabs" aria-label="Período">
<button type="button" class="historico-tab ativo" data-periodo="hoje">Hoje</button>
<button type="button" class="historico-tab" data-periodo="semana">Semana</button>
<button type="button" class="historico-tab" data-periodo="mes">Mês</button>
<button type="button" class="historico-tab" data-periodo="total">Total</button>
</nav>

<div class="historico-grid" id="historicoStats"></div>

<div class="historico-panels">
<section class="hist-panel">
<h2 class="icon-wrap"><span data-icon="bar-chart" data-icon-size="18"></span> Acertos × erros</h2>
<div class="hist-taxa" id="historicoTaxa"></div>
<div class="grafico-hist-wrap">
<canvas id="graficoAcertos" aria-label="Gráfico de acertos e erros"></canvas>
</div>
</section>

<section class="hist-panel">
<h2 class="icon-wrap"><span data-icon="bar-chart" data-icon-size="18" data-icon-class="icon--accent"></span> Evolução nas provas</h2>
<div class="grafico-hist-wrap">
<canvas id="graficoEvolucao" aria-label="Gráfico de evolução"></canvas>
</div>
<p style="margin:12px 0 0;font-size:12px;color:#64748b;line-height:1.5">
Baseado nas provas salvas no período selecionado.
</p>
</section>

<section class="hist-panel hist-panel--full">
<h2 class="icon-wrap"><span data-icon="list" data-icon-size="18"></span> Atividades recentes</h2>
<div id="historicoFeed"></div>
</section>
</div>

</div>

<script src="../js/app.js"></script>
<script src="../js/historico-page.js"></script>
<script>
document.addEventListener("DOMContentLoaded", function () {
  window.RevalidaIcons?.mount(document.body);
});
</script>
</body>
</html>
