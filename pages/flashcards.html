<!DOCTYPE html>
<html lang="pt-BR">
<head>
<link rel="stylesheet" href="../css/app.css">
<link rel="stylesheet" href="../css/layout.css">
<link rel="stylesheet" href="../css/pages.css">
<link rel="stylesheet" href="../css/icons.css">
<script src="../js/icons.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#1a1a2e">
<link rel="manifest" href="../manifest.json">
<title>Flashcards • Revalida</title>
<style>
*{
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}
html,body{
height:100%;
margin:0;
}
body{
display:flex;
flex-direction:column;
background:#2b2b2b;
color:#ececec;
font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
padding:0;
padding-top:env(safe-area-inset-top);
padding-bottom:env(safe-area-inset-bottom);
overflow-x:hidden;
overflow-y:auto;
-webkit-overflow-scrolling:touch;
max-width:900px;
margin-inline:auto;
width:100%;
min-height:100dvh;
box-shadow:0 0 80px rgba(0,0,0,.45);
}
@media(min-width:901px){
body{min-height:100dvh;border-left:1px solid #3a3a3a;border-right:1px solid #3a3a3a;}
}
.anki-header{
flex-shrink:0;
display:flex;
align-items:center;
justify-content:space-between;
padding:12px 16px;
background:#1e1e1e;
border-bottom:1px solid #3a3a3a;
}
.anki-header h1{
font-size:17px;
font-weight:700;
margin:0;
}
.stats-bar{
flex-shrink:0;
display:flex;
gap:8px;
padding:10px 16px;
background:#252525;
font-size:12px;
font-weight:700;
color:#9ca3af;
flex-wrap:wrap;
}
.stats-bar span{
padding:6px 10px;
border-radius:8px;
background:#333;
}
.stats-bar .due{color:#fbbf24;}
.deck-badge{
margin:0 16px 8px;
padding:8px 12px;
border-radius:10px;
background:rgba(124,255,178,.1);
border:1px solid rgba(124,255,178,.2);
color:#7CFFB2;
font-size:12px;
font-weight:600;
}
.review-wrap{
flex-shrink:0;
display:flex;
flex-direction:column;
border-bottom:1px solid #3a3a3a;
}
.anki-main{
display:flex;
flex-direction:column;
min-height:220px;
max-height:min(52vh,480px);
padding:12px 16px;
overflow:hidden;
}
.card-stage{
flex:1;
display:flex;
align-items:center;
justify-content:center;
min-height:180px;
padding:8px 0;
}
.card-flip{
width:100%;
max-width:640px;
max-height:100%;
overflow-y:auto;
background:#353535;
border:1px solid #454545;
border-radius:16px;
padding:28px 24px;
cursor:pointer;
box-shadow:0 8px 32px rgba(0,0,0,.35);
-webkit-overflow-scrolling:touch;
}
.card-flip .label{
font-size:11px;
font-weight:800;
letter-spacing:.08em;
text-transform:uppercase;
color:#7CFFB2;
margin-bottom:12px;
}
.card-flip .texto{
font-size:18px;
line-height:1.65;
color:#f3f4f6;
white-space:pre-wrap;
word-break:break-word;
}
.card-flip .hint{
margin-top:20px;
font-size:13px;
color:#6b7280;
text-align:center;
}
.anki-footer{
flex-shrink:0;
padding:12px 16px max(16px, env(safe-area-inset-bottom));
background:#1e1e1e;
border-top:1px solid #3a3a3a;
}
.show-answer{
width:100%;
padding:18px;
border:none;
border-radius:12px;
background:#3b82f6;
color:#fff;
font-size:16px;
font-weight:800;
cursor:pointer;
}
.show-answer:disabled{
opacity:.5;
cursor:default;
}
.rating-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:8px;
}
.rating-btn{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:4px;
padding:14px 6px;
border:none;
border-radius:10px;
font-weight:800;
font-size:13px;
cursor:pointer;
min-height:72px;
transition:transform .12s,filter .12s;
}
.rating-btn:active{transform:scale(.96);}
.rating-btn .interval{
font-size:11px;
font-weight:600;
opacity:.9;
}
.rating-again{background:#cf4c4c;color:#fff;}
.rating-hard{background:#c1773a;color:#fff;}
.rating-good{background:#4caf50;color:#fff;}
.rating-easy{background:#2196f3;color:#fff;}
.empty{
flex:1;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
padding:32px 20px;
color:#9ca3af;
line-height:1.7;
}
.empty h2{color:#e5e7eb;margin-bottom:12px;font-size:20px;}
.empty a{color:#7CFFB2;margin-top:16px;}
.empty .proxima{
margin-top:8px;
font-size:14px;
color:#fbbf24;
}
.deck-list-section{
flex-shrink:0;
padding:16px 16px max(24px, env(safe-area-inset-bottom));
background:#242424;
}
.deck-list-header{
display:flex;
align-items:center;
justify-content:space-between;
gap:12px;
margin-bottom:14px;
flex-wrap:wrap;
}
.deck-list-header h2{
margin:0;
font-size:16px;
font-weight:800;
color:#f3f4f6;
}
.btn-novo-card{
padding:10px 14px;
border:none;
border-radius:10px;
background:linear-gradient(135deg,#6366F1,#8B5CF6);
color:#fff;
font-size:13px;
font-weight:800;
cursor:pointer;
}
.deck-add-form{
display:none;
padding:14px;
margin-bottom:14px;
border-radius:14px;
background:#2f2f2f;
border:1px solid #454545;
}
.deck-add-form.aberto{display:block;}
.deck-add-form label{
display:block;
font-size:12px;
font-weight:700;
color:#9ca3af;
margin-bottom:6px;
}
.deck-add-form input,
.deck-add-form textarea{
width:100%;
margin-bottom:12px;
padding:12px;
border-radius:10px;
border:1px solid #555;
background:#1e1e1e;
color:#f3f4f6;
font-size:14px;
font-family:inherit;
resize:vertical;
}
.deck-add-form textarea{min-height:72px;}
.deck-add-actions{
display:flex;
gap:8px;
flex-wrap:wrap;
}
.btn-salvar-card{
padding:12px 16px;
border:none;
border-radius:10px;
background:#22c55e;
color:#fff;
font-weight:800;
font-size:14px;
cursor:pointer;
}
.btn-cancelar-card{
padding:12px 16px;
border:none;
border-radius:10px;
background:#444;
color:#e5e7eb;
font-weight:700;
font-size:14px;
cursor:pointer;
}
.deck-list{
display:flex;
flex-direction:column;
gap:10px;
}
.deck-list-empty{
margin:0;
padding:20px;
text-align:center;
color:#9ca3af;
font-size:14px;
line-height:1.6;
border-radius:12px;
background:#2f2f2f;
border:1px dashed #555;
}
.deck-item{
display:flex;
gap:12px;
align-items:flex-start;
padding:14px;
border-radius:12px;
background:#2f2f2f;
border:1px solid #454545;
}
.deck-item.due-now{border-color:rgba(251,191,36,.45);}
.deck-item-num{
flex-shrink:0;
width:28px;
height:28px;
display:flex;
align-items:center;
justify-content:center;
border-radius:8px;
background:#3a3a3a;
font-size:12px;
font-weight:800;
color:#9ca3af;
}
.deck-item-body{flex:1;min-width:0;}
.deck-item-pergunta{
font-size:14px;
font-weight:700;
color:#f3f4f6;
line-height:1.45;
margin:0 0 6px;
word-break:break-word;
}
.deck-item-resposta{
font-size:13px;
color:#9ca3af;
line-height:1.45;
margin:0 0 8px;
word-break:break-word;
display:-webkit-box;
-webkit-line-clamp:2;
-webkit-box-orient:vertical;
overflow:hidden;
}
.deck-item-meta{
display:flex;
flex-wrap:wrap;
gap:6px;
font-size:11px;
font-weight:700;
}
.deck-item-meta span{
padding:4px 8px;
border-radius:6px;
background:#3a3a3a;
color:#9ca3af;
}
.deck-item-meta .tag-due{background:rgba(251,191,36,.15);color:#fbbf24;}
.deck-item-meta .tag-user{background:rgba(124,255,178,.12);color:#7CFFB2;}
.btn-excluir-card{
flex-shrink:0;
padding:8px 10px;
border:none;
border-radius:8px;
background:rgba(207,76,76,.2);
color:#f87171;
font-size:12px;
font-weight:800;
cursor:pointer;
}
.btn-excluir-card:hover{background:rgba(207,76,76,.35);}
@media(max-width:380px){
.rating-btn{font-size:11px;padding:12px 4px;min-height:64px;}
.rating-btn .interval{font-size:10px;}
.deck-item{flex-direction:column;}
.btn-excluir-card{width:100%;}
}
</style>
<style>html.auth-pending body{visibility:hidden}</style>
<script type="module" src="../js/auth-guard.js"></script>
</head>
<body>

<header class="anki-header">
<h1 class="icon-wrap"><span data-icon="brain" data-icon-size="22"></span> Flashcards</h1>
<a href="../dashboard.html" class="btn-dashboard-home icon-wrap"><span data-icon="home" data-icon-size="18"></span> Dashboard</a>
</header>

<div class="stats-bar" id="statsBar">
<span class="due" id="statDue">0 para hoje</span>
<span id="statTotal">0 cards</span>
</div>

<div id="deckBadge"></div>

<div class="review-wrap">
<main class="anki-main" id="ankiMain">
<div id="area"></div>
</main>

<footer class="anki-footer" id="ankiFooter" style="display:none">
<button type="button" class="show-answer" id="btnMostrar">Mostrar resposta</button>
<div class="rating-grid" id="ratingGrid" style="display:none">
<button type="button" class="rating-btn rating-again" data-r="1">
<span>De novo</span>
<span class="interval" data-i="1"></span>
</button>
<button type="button" class="rating-btn rating-hard" data-r="2">
<span>Difícil</span>
<span class="interval" data-i="2"></span>
</button>
<button type="button" class="rating-btn rating-good" data-r="3">
<span>Bom</span>
<span class="interval" data-i="3"></span>
</button>
<button type="button" class="rating-btn rating-easy" data-r="4">
<span>Fácil</span>
<span class="interval" data-i="4"></span>
</button>
</div>
</footer>
</div>

<section class="deck-list-section" aria-label="Gerenciar cards">
<div class="deck-list-header">
<h2 class="icon-wrap"><span data-icon="list" data-icon-size="18"></span> Todos os cards (<span id="deckListCount">0</span>)</h2>
<button type="button" class="btn-novo-card" id="btnToggleAdd">+ Novo card</button>
</div>

<form class="deck-add-form" id="formNovoCard">
<label for="novoPergunta">Pergunta / frente</label>
<textarea id="novoPergunta" rows="2" placeholder="Ex.: Qual o diagnóstico mais provável?" required minlength="3"></textarea>
<label for="novoResposta">Resposta / verso</label>
<textarea id="novoResposta" rows="2" placeholder="Sua explicação ou resposta correta" required minlength="3"></textarea>
<div class="deck-add-actions">
<button type="submit" class="btn-salvar-card">Adicionar ao deck</button>
<button type="button" class="btn-cancelar-card" id="btnCancelarAdd">Cancelar</button>
</div>
</form>

<div class="deck-list" id="deckList"></div>
</section>

<script src="../js/flashcards-deck.js"></script>
<script src="../js/flashcards-srs.js"></script>
<script src="../js/historico-store.js"></script>
<script>
const deckKey = window.RevalidaFlashcards?.DECK_KEY || "flashcards_deck";
const metaKey = window.RevalidaFlashcards?.META_KEY || "flashcards_deck_meta";
const params = new URLSearchParams(location.search);
const fromProva = params.get("from") === "prova";

let deck = [];
let deckMeta = null;
let fila = [];
let cardAtual = null;
let mostrandoResposta = false;

function escapeHtml(text) {
  return window.RevalidaApp?.escapeHtml(text) ?? String(text ?? "");
}

async function salvarDeck() {
  localStorage.setItem(deckKey, JSON.stringify(deck));
  if (window.RevalidaSync?.flushSync) {
    await window.RevalidaSync.flushSync();
  }
}

function estadoCardLabel(card) {
  const sched = card.sched || {};
  const agora = Date.now();
  if ((sched.due ?? 0) <= agora) return { texto: "Para hoje", due: true };
  const em = window.RevalidaSRS.formatDelay((sched.due ?? agora) - agora);
  return { texto: `Em ${em}`, due: false };
}

function renderListaCards() {
  const lista = document.getElementById("deckList");
  const contador = document.getElementById("deckListCount");
  if (!lista) return;

  if (contador) contador.textContent = String(deck.length);

  if (!deck.length) {
    lista.innerHTML =
      '<p class="deck-list-empty">Nenhum card no deck. Use <strong>+ Novo card</strong> ou crie em Provas salvas.</p>';
    return;
  }

  const ordenado = deck
    .map((card, index) => ({ card, index }))
    .sort((a, b) => (a.card.sched?.due ?? 0) - (b.card.sched?.due ?? 0));

  lista.innerHTML = ordenado
    .map(({ card, index }, pos) => {
      const st = estadoCardLabel(card);
      const ehUsuario =
        card.origem === "usuario" || deckMeta?.tipo === "criados_pelo_usuario";
      const pergunta = escapeHtml(String(card.pergunta || "").trim() || "(sem pergunta)");
      const resposta = escapeHtml(String(card.resposta || "").trim() || "(sem resposta)");
      const idAttr = escapeHtml(card.id);

      return `
        <article class="deck-item${st.due ? " due-now" : ""}" data-id="${idAttr}">
          <div class="deck-item-num">${pos + 1}</div>
          <div class="deck-item-body">
            <p class="deck-item-pergunta">${pergunta}</p>
            <p class="deck-item-resposta">${resposta}</p>
            <div class="deck-item-meta">
              <span class="${st.due ? "tag-due" : ""}">${escapeHtml(st.texto)}</span>
              ${ehUsuario ? '<span class="tag-user">Seu card</span>' : '<span>Demonstração</span>'}
            </div>
          </div>
          <button type="button" class="btn-excluir-card" data-excluir="${idAttr}" aria-label="Excluir card">Excluir</button>
        </article>`;
    })
    .join("");

  lista.querySelectorAll("[data-excluir]").forEach((btn) => {
    btn.addEventListener("click", () => excluirCard(btn.getAttribute("data-excluir")));
  });
}

function toggleFormNovoCard(abrir) {
  const form = document.getElementById("formNovoCard");
  const btn = document.getElementById("btnToggleAdd");
  if (!form) return;
  const mostrar = typeof abrir === "boolean" ? abrir : !form.classList.contains("aberto");
  form.classList.toggle("aberto", mostrar);
  if (btn) btn.textContent = mostrar ? "Fechar" : "+ Novo card";
  if (mostrar) document.getElementById("novoPergunta")?.focus();
}

async function adicionarCard(ev) {
  ev.preventDefault();
  const pergunta = document.getElementById("novoPergunta")?.value.trim() || "";
  const resposta = document.getElementById("novoResposta")?.value.trim() || "";

  if (pergunta.length < 3 || resposta.length < 3) {
    alert("Pergunta e resposta precisam ter pelo menos 3 caracteres.");
    return;
  }

  const novo = window.RevalidaSRS.normalizeCard(
    {
      pergunta,
      resposta,
      origem: "usuario",
      nomeProva: deckMeta?.titulo || "",
    },
    deck.length
  );

  deck.push(novo);
  deck = window.RevalidaSRS.normalizeDeck(deck);
  await salvarDeck();

  if (window.RevalidaHistorico) {
    window.RevalidaHistorico.registrar({
      tipo: "flashcard_criado",
      nomeProva: deckMeta?.titulo || "",
      titulo: pergunta.slice(0, 80),
    });
  }

  document.getElementById("novoPergunta").value = "";
  document.getElementById("novoResposta").value = "";
  toggleFormNovoCard(false);

  mostrandoResposta = false;
  montarFila();
  cardAtual = fila[0] || null;
  renderCard();
  renderListaCards();
}

async function excluirCard(id) {
  if (!id) return;
  const card = deck.find((c) => c.id === id);
  if (!card) return;

  const preview = String(card.pergunta || "").slice(0, 60);
  if (!confirm(`Excluir este card?\n\n"${preview}${preview.length >= 60 ? "…" : ""}"`)) return;

  deck = deck.filter((c) => c.id !== id);
  deck = window.RevalidaSRS.normalizeDeck(deck);

  if (cardAtual?.id === id) {
    cardAtual = null;
    mostrandoResposta = false;
  }

  await salvarDeck();
  montarFila();
  cardAtual = fila[0] || null;
  renderCard();
  renderListaCards();
}

function carregarMeta() {
  const raw = sessionStorage.getItem(metaKey);
  if (!raw) return;
  try {
    deckMeta = JSON.parse(raw);
  } catch {
    deckMeta = null;
  }
}

function atualizarStats() {
  const stats = window.RevalidaSRS.deckStats(deck);
  document.getElementById("statDue").textContent = `${stats.due} para hoje`;
  document.getElementById("statTotal").textContent = `${stats.total} cards`;
}

function montarFila() {
  fila = window.RevalidaSRS.getDueCards(deck);
  cardAtual = fila[0] || null;
}

function renderBadge() {
  const el = document.getElementById("deckBadge");
  if (!deckMeta) {
    el.innerHTML = "";
    return;
  }
  const ehUsuario = deckMeta.tipo === "criados_pelo_usuario";
  el.innerHTML = `<div class="deck-badge icon-wrap">${window.RevalidaIcons.icon("book", { size: 16, class: "icon--accent" })} ${escapeHtml(deckMeta.titulo)}${deckMeta.data ? " • " + escapeHtml(deckMeta.data) : ""}${ehUsuario ? " • seus cards" : ""}</div>`;
}

function atualizarIntervalosBotoes() {
  if (!cardAtual) return;
  const prev = window.RevalidaSRS.previewIntervals(cardAtual);
  document.querySelectorAll(".rating-btn .interval").forEach((el) => {
    const r = el.getAttribute("data-i");
    el.textContent = prev[r] || "";
  });
}

function mostrarRodapeResposta() {
  const footer = document.getElementById("ankiFooter");
  footer.style.display = "block";
  document.getElementById("btnMostrar").style.display = "none";
  document.getElementById("ratingGrid").style.display = "grid";
  atualizarIntervalosBotoes();
}

function mostrarRodapePergunta() {
  const footer = document.getElementById("ankiFooter");
  footer.style.display = "block";
  document.getElementById("btnMostrar").style.display = "block";
  document.getElementById("ratingGrid").style.display = "none";
}

function esconderRodape() {
  document.getElementById("ankiFooter").style.display = "none";
}

function renderVazio(msg, extra) {
  esconderRodape();
  document.getElementById("area").innerHTML = `
    <div class="empty">
      <h2>${msg}</h2>
      ${extra || ""}
    </div>`;
  renderListaCards();
}

function renderSemDue() {
  const next = window.RevalidaSRS.getNextDueTime(deck);
  let proxHtml = "";
  if (next) {
    const em = window.RevalidaSRS.formatDelay(next - Date.now());
    proxHtml = `<p class="proxima">Próximo card em ${em}</p>`;
  }
  renderVazio(
    "Nada para revisar agora",
    `<p>Você está em dia. Volte quando os cards vencerem.</p>${proxHtml}
     <a href="provas_salvas.html">← Provas salvas</a>`
  );
}

function renderCard() {
  const area = document.getElementById("area");

  if (!deck.length) {
    renderVazio(
      "Nenhum card para revisar",
      '<p>Adicione cards na lista abaixo ou em <a href="provas_salvas.html">Provas salvas</a>.</p>'
    );
    return;
  }

  montarFila();

  if (!cardAtual) {
    renderSemDue();
    atualizarStats();
    return;
  }

  const ehUsuario =
    cardAtual.origem === "usuario" || deckMeta?.tipo === "criados_pelo_usuario";
  const label = mostrandoResposta
    ? ehUsuario
      ? "Sua análise"
      : "Resposta"
    : ehUsuario
      ? "Sua pergunta"
      : "Pergunta";
  const texto = mostrandoResposta ? cardAtual.resposta : cardAtual.pergunta;
  const restantes = fila.length;

  area.innerHTML = `
    <div class="card-stage">
      <div class="card-flip" id="flipCard" role="button" tabindex="0" aria-label="Virar card">
        <div class="label">${escapeHtml(label)} · ${restantes} na fila</div>
        <div class="texto">${escapeHtml(texto)}</div>
        <div class="hint">${mostrandoResposta ? "Toque para ver a pergunta" : "Toque no card ou use o botão abaixo"}</div>
      </div>
    </div>`;

  if (mostrandoResposta) {
    mostrarRodapeResposta();
  } else {
    mostrarRodapePergunta();
  }

  document.getElementById("flipCard").addEventListener("click", virarCard);
  document.getElementById("btnMostrar").onclick = () => {
    mostrandoResposta = true;
    renderCard();
  };

  atualizarStats();
  renderListaCards();
}

function virarCard() {
  if (!mostrandoResposta) {
    mostrandoResposta = true;
    renderCard();
  } else {
    mostrandoResposta = false;
    renderCard();
  }
}

async function classificar(rating) {
  if (!cardAtual || !mostrandoResposta) return;

  const idx = deck.findIndex((c) => c.id === cardAtual.id);
  if (idx === -1) return;

  deck[idx] = window.RevalidaSRS.rate(deck[idx], rating);
  await salvarDeck();

  if (window.RevalidaHistorico) {
    window.RevalidaHistorico.registrar({
      tipo: "flashcard_revisado",
      nomeProva: deck[idx].nomeProva || deckMeta?.titulo || "",
      titulo: String(deck[idx].pergunta || "").slice(0, 80),
    });
  }

  mostrandoResposta = false;
  montarFila();
  cardAtual = fila[0] || null;

  if (cardAtual) {
    renderCard();
  } else {
    renderSemDue();
    atualizarStats();
  }
  renderListaCards();
}

document.querySelectorAll(".rating-btn").forEach((btn) => {
  btn.addEventListener("click", () => {
    classificar(parseInt(btn.getAttribute("data-r"), 10));
  });
});

function aplicarDeckCarregado() {
  deck = window.RevalidaSRS.normalizeDeck(deck);
  renderBadge();
  montarFila();
  cardAtual = fila[0] || null;
  mostrandoResposta = false;
  renderCard();
  renderListaCards();
}

function recarregarDeckDoStorage() {
  const salvo = localStorage.getItem(deckKey);
  if (!salvo) return false;
  try {
    const parsed = JSON.parse(salvo);
    if (!Array.isArray(parsed)) return false;
    deck = parsed;
    aplicarDeckCarregado();
    return true;
  } catch {
    return false;
  }
}

async function carregarDeck() {
  carregarMeta();
  renderBadge();

  if (recarregarDeckDoStorage()) {
    await salvarDeck();
    return;
  }

  if (fromProva) {
    deck = [];
    renderVazio(
      "Nenhum deck encontrado",
      '<p>Crie flashcards em Provas salvas ou adicione abaixo.</p><a href="provas_salvas.html">← Provas salvas</a>'
    );
    return;
  }

  try {
    const res = await fetch("../conteudo/revalida_2022_1.json");
    if (!res.ok) throw new Error("Falha ao carregar.");
    const data = await res.json();
    deck = window.RevalidaSRS.normalizeDeck(
      (data || []).slice(0, 30).map((q) => ({
        pergunta: q.pergunta,
        resposta: q.alternativas?.[q.correta] || "—",
      }))
    );
    await salvarDeck();
    aplicarDeckCarregado();
  } catch {
    deck = [];
    renderVazio("Erro ao carregar", "<p>Tente adicionar seus cards manualmente abaixo.</p>");
  }
}

document.getElementById("btnToggleAdd")?.addEventListener("click", () => toggleFormNovoCard());
document.getElementById("btnCancelarAdd")?.addEventListener("click", () => toggleFormNovoCard(false));
document.getElementById("formNovoCard")?.addEventListener("submit", adicionarCard);

window.addEventListener("storage", (e) => {
  if (e.key === deckKey) recarregarDeckDoStorage();
});

(async function () {
  if (window.RevalidaSync?.whenReady) await window.RevalidaSync.whenReady();
  await carregarDeck();
  window.RevalidaIcons?.mount(document.getElementById("deckListSection"));
})();
</script>
<script src="../js/app.js"></script>
</body>
</html>
