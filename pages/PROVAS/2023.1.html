let acertos = 0;

let erros = 0;

let tamanhoTexto = 18;

/* =========================================
STATUS DAS QUESTOES
========================================= */

let statusQuestoes = {};

/* =========================================
RESPOSTAS MARCADAS
========================================= */

let respostasUsuario = {};

/* =========================================
QUESTOES RESPONDIDAS
========================================= */

let questoesRespondidas = {};

/* =========================================
SALVAMENTO LOCAL
========================================= */

const STORAGE_KEY =
`revalida_progresso_${NOME_PROVA}`;

const STORAGE_PROVAS =
`provas_salvas_${NOME_PROVA}`;

/* =========================================
SALVAR
========================================= */

function salvarProgresso(){

localStorage.setItem(STORAGE_KEY, JSON.stringify({

questaoAtual,
acertos,
erros,
statusQuestoes,
respostasUsuario,
questoesRespondidas

}));

}

/* =========================================
CARREGAR
========================================= */

function carregarProgresso(){

const dados =
localStorage.getItem(STORAGE_KEY);

if(!dados) return;

const progresso = JSON.parse(dados);

questaoAtual =
progresso.questaoAtual || 0;

acertos =
progresso.acertos || 0;

erros =
progresso.erros || 0;

statusQuestoes =
progresso.statusQuestoes || {};

respostasUsuario =
progresso.respostasUsuario || {};

questoesRespondidas =
progresso.questoesRespondidas || {};

document.getElementById("acertos")
.innerText = acertos;

document.getElementById("erros")
.innerText = erros;

}

/* =========================================
CARREGAR JSON
========================================= */

fetch("../../conteudo/revalida_2023_1.json")

.then((res) => {
if (!res.ok) throw new Error("Não foi possível carregar as questões desta edição.");
return res.json();
})
.then((data) => {
if (!Array.isArray(data) || !data.length) throw new Error("Esta edição ainda não possui questões cadastradas.");
questoes = data;

/* CARREGA PROGRESSO */

carregarProgresso();

/* GERA GRADE */

gerarGradeQuestoes();

/* CARREGA QUESTAO */

carregarQuestao();

atualizarProgresso();
})
.catch((err) => {
alert(err.message || "Erro ao carregar o simulado.");
});

/* =========================================
MENU
========================================= */

function abrirMenu(){

let menu =
document.getElementById("menuOpcoes");

menu.style.display =
menu.style.display === "flex"
? "none"
: "flex";

}


/* =========================================
MODOS
========================================= */

function ativarModoProva(){

modoProva = true;

/* ESCONDE ESTATISTICAS */

document.querySelector(".estatisticas")
.style.display = "none";

/* ATUALIZA GRADE */

gerarGradeQuestoes();

/* RECARREGA QUESTAO */

carregarQuestao();

alert("📝 Modo prova ativado");

}

function ativarModoEstudo(){

modoProva = false;

/* MOSTRA ESTATISTICAS */

document.querySelector(".estatisticas")
.style.display = "flex";

/* ATUALIZA GRADE */

gerarGradeQuestoes();

/* RECARREGA QUESTAO */

carregarQuestao();

alert("📘 Modo estudo ativado");

}

/* =========================================
TOGGLE QUESTOES
========================================= */

function toggleGradeQuestoes(){

let grade =
document.getElementById("gradeQuestoes");

let seta =
document.getElementById("setaGrade");

if(grade.style.display === "flex"){

grade.style.display = "none";

seta.style.transform = "rotate(0deg)";

seta.innerHTML = "▾";

}else{

grade.style.display = "flex";

seta.style.transform = "rotate(180deg)";

seta.innerHTML = "▴";

}

}

/* =========================================
GERAR GRADE
========================================= */

function gerarGradeQuestoes(){

let html = "";

questoes.forEach((q,index)=>{

let classeStatus = "";

/* =========================================
MODO PROVA
========================================= */

if(modoProva){

if(respostasUsuario[index] !== undefined){

classeStatus = "respondida-prova";

}

/* =========================================
MODO ESTUDO
========================================= */

}else{

if(statusQuestoes[index] === "acertou"){

classeStatus = "acertou";

}

if(statusQuestoes[index] === "errou"){

classeStatus = "errou";

}

}

html += `

<div
class="numero-questao
${index === questaoAtual ? 'ativa' : ''}
${classeStatus}"

onclick="irParaQuestao(${index})">

${q.numero}

</div>

`;

});

document.getElementById("gradeQuestoes")
.innerHTML = html;

}

/* =========================================
IR QUESTAO
========================================= */

function irParaQuestao(index){

questaoAtual = index;

/* FECHA MENU QUESTOES */

document.getElementById("gradeQuestoes")
.style.display = "none";

/* VOLTA ICONE */

document.getElementById("setaGrade")
.innerHTML = "▾";

document.getElementById("setaGrade")
.style.transform = "rotate(0deg)";

/* SALVA */

salvarProgresso();

/* CARREGA */

carregarQuestao();

atualizarProgresso();

}

/* =========================================
PROGRESSO
========================================= */

function atualizarProgresso(){

const total = questoes.length;

if(!total) return;

const respondidas = Object.keys(questoesRespondidas).length;

const pct = Math.round((respondidas / total) * 100);

const label = document.getElementById("progressoLabel");

const pctEl = document.getElementById("progressoPct");

const fill = document.getElementById("progressoFill");

const counter = document.getElementById("examCounter");

if(label){

label.textContent =
`Questão ${questaoAtual + 1} de ${total} • ${respondidas} respondida(s)`;

}

if(pctEl) pctEl.textContent = `${pct}%`;

if(fill) fill.style.width = `${pct}%`;

const track = fill?.parentElement;

if(track){

track.setAttribute("aria-valuenow", String(pct));

}

if(counter){

counter.textContent =
`${questaoAtual + 1} / ${total}`;

}

}

/* =========================================
CARREGAR QUESTAO
========================================= */

function carregarQuestao(){

selecionada = null;

let q = questoes[questaoAtual];

if(!q) return;

/* VERIFICA SE JA RESPONDEU */

respondida =
questoesRespondidas[questaoAtual]
? true
: false;

/* TITULO */

document.getElementById("tituloQuestao")
.innerHTML =
"QUESTÃO " + q.numero;

/* ENUNCIADO */

document.getElementById("enunciado")
.innerHTML =
q.pergunta.replace(/\\n/g,"<br>");

/* COMENTARIO */

document.getElementById("comentarioAtual")
.innerHTML =
q.comentario ||
"Comentário não disponível.";

document.getElementById("comentarioAtual")
.style.display = "none";

document.getElementById("btnComentarioAtual")
.style.display = "none";

/* ALTERNATIVAS */

let html = "";

q.alternativas.forEach((alt,index)=>{

const letra = LETRAS[index] || String(index + 1);

html += `

<div class="alternativa"
id="alt-${index}">

<div class="alt-corpo">

<span class="alt-letra">${letra}</span>

<div class="texto-alternativa"
onclick="selecionarAlternativa(${index})">

${alt}

</div>

</div>

<div class="cortar"
onclick="cortarAlternativa(event,${index})"
title="Cortar alternativa">

✂️

</div>

</div>

`;

});

document.getElementById("alternativas")
.innerHTML = html;

atualizarProgresso();

/* RESTAURA RESPOSTA */

if(respostasUsuario[questaoAtual] !== undefined){

selecionada =
respostasUsuario[questaoAtual];

const alternativaSalva =
document.getElementById(
`alt-${selecionada}`
);

if(alternativaSalva){

alternativaSalva.classList
.add("selecionada");

}

/* SE JA RESPONDEU */

if(questoesRespondidas[questaoAtual]){

if(!modoProva){

document.querySelectorAll(".alternativa")[q.correta]
.classList.add("correta");

if(selecionada !== q.correta){

document.querySelectorAll(".alternativa")[selecionada]
.classList.add("errada");

}

document.getElementById("btnComentarioAtual")
.style.display = "block";

}

}

}

/* GERA GRADE */

gerarGradeQuestoes();

}

/* =========================================
SELECIONAR
========================================= */

function selecionarAlternativa(index){

/* BLOQUEIA ALTERACAO */

if(respondida) return;

selecionada = index;

/* SALVA RESPOSTA */

respostasUsuario[questaoAtual] = index;

document.querySelectorAll(".alternativa")
.forEach(item=>{

item.classList.remove("selecionada");

});

/* MARCA */

document.getElementById(`alt-${index}`)
.classList.add("selecionada");

/* SALVA */

salvarProgresso();

}

/* =========================================
RESPONDER
========================================= */

function confirmarResposta(){

/* BLOQUEIA RESPOSTA DUPLA */

if(respondida) return;

if(selecionada === null){

alert("Selecione uma alternativa.");

return;

}

respondida = true;

/* MARCA COMO RESPONDIDA */

questoesRespondidas[questaoAtual] = true;

let q = questoes[questaoAtual];

let alternativas =
document.querySelectorAll(".alternativa");

/* MOSTRA CORRETA */

if(!modoProva){

alternativas[q.correta]
.classList.add("correta");

document.getElementById("btnComentarioAtual")
.style.display = "block";

}

/* ACERTO */

if(selecionada === q.correta){

acertos++;

statusQuestoes[questaoAtual] =
"acertou";

document.getElementById("acertos")
.innerText = acertos;

/* ERRO */

}else{

erros++;

statusQuestoes[questaoAtual] =
"errou";

document.getElementById("erros")
.innerText = erros;

if(!modoProva){

alternativas[selecionada]
.classList.add("errada");

}

}

/* ATUALIZA */

gerarGradeQuestoes();

/* SALVA */

salvarProgresso();

atualizarProgresso();

}

/* =========================================
COMENTARIO
========================================= */

/* =========================================
TOGGLE COMENTARIO ERRO

function toggleComentarioErro(index){

`comentario-erro-${index}`

/* =========================================
CORTAR
========================================= */

function cortarAlternativa(event,index){

/* =========================================
TAMANHO TEXTO
========================================= */

function aumentarTexto(){

tamanhoTexto += 2;

document.querySelector(".enunciado")
.style.fontSize =
tamanhoTexto + "px";

}

function diminuirTexto(){

if(tamanhoTexto > 14){

tamanhoTexto -= 2;

document.querySelector(".enunciado")
.style.fontSize =
tamanhoTexto + "px";

}

}

/* =========================================
NAVEGACAO
========================================= */

function proximaQuestao(){

if(questaoAtual < questoes.length - 1){

questaoAtual++;

salvarProgresso();

carregarQuestao();

}

}

function voltarQuestao(){

if(questaoAtual > 0){

questaoAtual--;

salvarProgresso();

carregarQuestao();

}

}

/* =========================================
FINALIZAR
========================================= */

function finalizarProva(){

/* ESCONDE BOTAO FINALIZAR */

document.getElementById("menuOpcoes")
.style.display = "none";

/* MOSTRA RESULTADOS */

document.getElementById("resultados")
.style.display = "block";

let total = acertos + erros;

let porcentagemAcertos =
total > 0

/* HTML RESULTADO */

const temErros = erros > 0;

document.getElementById("resumoResultado")

</div>

</div>

<div class="questoes-erradas">

</div>

<div class="resultado-acoes">

<button
class="btn-responder"
onclick="salvarProvaLocal()">

💾 Salvar prova

</button>

${temErros ? `
<button
type="button"
class="btn-flashcard-result"
onclick="iniciarCriacaoFlashcards()">

✍️ Criar flashcards dos meus erros

</button>
` : ""}

<a
class="btn-secundario"
href="../../pages/provas_salvas.html">

📚 Ir para provas salvas

</a>

</div>

`;

gerarGrafico();

/* SCROLL RESULTADO */

document.getElementById("resultados")
.scrollIntoView({
behavior:"smooth"
});

}

SAIR
========================================= */

function sairProva(){

localStorage.removeItem(STORAGE_KEY);

location.reload();

}

function irHome(){

window.location.href = "../../dashboard.html";

}
/* =========================================
SALVAR PROVA
========================================= */

function salvarProvaLocal(){

const provas =
JSON.parse(
localStorage.getItem("provas_salvas")
|| "[]"
);

/* QUESTOES ERRADAS */

let questoesErradas = [];

questoes.forEach((q,index)=>{

if(statusQuestoes[index] === "errou"){

questoesErradas.push({

numero:q.numero,

enunciado:
q.pergunta || "",

alternativas:
q.alternativas || [],

respostaUsuario:
q.alternativas[
respostasUsuario[index]
],

respostaCorreta:
q.alternativas[q.correta],

comentario:
q.comentario ||
"Comentário não disponível."

});

}

});

const novaProva = {

nomeProva:NOME_PROVA,

data:
new Date().toLocaleString(),

acertos,
erros,

questoesErradas,

respostasUsuario,

statusQuestoes

};

provas.push(novaProva);

localStorage.setItem(
"provas_salvas",
JSON.stringify(provas)
);

alert("✅ Prova salva! Em Provas salvas você pode criar flashcards analisando cada erro.");

}

/* =========================================
CRIAR FLASHCARDS (ANÁLISE PRÓPRIA)
========================================= */

function iniciarCriacaoFlashcards(){

const errosLista = [];

questoes.forEach((q,index)=>{

if(statusQuestoes[index] !== "errou") return;

errosLista.push({

numero:q.numero,

enunciado:q.pergunta || "",

alternativas:q.alternativas || [],

respostaUsuario:q.alternativas[respostasUsuario[index]],

respostaCorreta:q.alternativas[q.correta],

comentario:q.comentario || "",

anotacao:""

});

});

if(!errosLista.length){

alert("Não há questões erradas para analisar.");

return;

}

window.RevalidaFlashcards.saveCreateSession({

nomeProva:NOME_PROVA,

data:new Date().toLocaleString(),

questoesErradas:errosLista

});

window.RevalidaFlashcards.goToCriar(
"../../pages/criar_flashcards.html",
{ source: "sessao" }
);

}


let sintetizador=window.speechSynthesis;
let lendoQuestao=false;
let vocesDisponiveis=[];

function carregarVozes(){
vocesDisponiveis=speechSynthesis.getVoices();
}
carregarVozes();
speechSynthesis.onvoiceschanged=carregarVozes;

function obterVoz(){
const tipo=document.getElementById("tipoVoz")?.value||"feminina";
const pt=vocesDisponiveis.filter(v=>v.lang&&v.lang.toLowerCase().includes("pt"));
if(!pt.length) return null;
if(tipo==="masculina"){
return pt.find(v=>/male|mascul/i.test(v.name))||pt[0];
}
return pt.find(v=>/female|femin/i.test(v.name))||pt[0];
}


function lerQuestao(){
const btn=document.getElementById("btnAudioMini");

if(!window.speechSynthesis){
alert("Seu navegador não suporta leitura de voz.");
return;
}

if(lendoQuestao){
speechSynthesis.cancel();
lendoQuestao=false;
if(btn){
btn.innerHTML="🔊";
btn.classList.remove("lendo");
}
return;
}

const q=questoes[questaoAtual];
if(!q) return;

let texto=(q.pergunta||"")+". ";

(q.alternativas||[]).forEach((alt,index)=>{
const letra=String.fromCharCode(65+index);
texto+=`Alternativa ${letra}. ${alt}. `;
});

const fala=new SpeechSynthesisUtterance(texto);
fala.lang="pt-BR";
fala.rate=1;
fala.pitch=1;
fala.volume=1;

const voz=vocesDisponiveis.find(v=>v.lang && v.lang.toLowerCase().includes("pt"));
if(voz) fala.voice=voz;

fala.onend=()=>{
lendoQuestao=false;
if(btn){
btn.innerHTML="🔊";
btn.classList.remove("lendo");
}
};

speechSynthesis.cancel();
speechSynthesis.speak(fala);

lendoQuestao=true;
if(btn){
btn.innerHTML="⏹";
btn.classList.add("lendo");
}
}

document.addEventListener("keydown",function(e){

e.target.tagName!=="INPUT" &&
e.target.tagName!=="TEXTAREA" &&
e.target.tagName!=="SELECT"){
e.preventDefault();
lerQuestao();
}
});
