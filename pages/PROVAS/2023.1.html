<script>

let questoes = [];

let questaoAtual = 0;

let selecionada = null;

let respondida = false;

let modoProva = false;

let acertos = 0;

let erros = 0;

let tamanhoTexto = 18;

/* =========================================
STATUS DAS QUESTOES
========================================= */

let statusQuestoes = {};

/* =========================================
RESPOSTAS MARCADAS
========================================= */

let respostasUsuario = {};

/* =========================================
QUESTOES RESPONDIDAS
========================================= */

let questoesRespondidas = {};

let marcasTexto = {};

let marcaTextoCtrl = null;

/* =========================================
SALVAMENTO LOCAL
========================================= */

const STORAGE_KEY =
`revalida_progresso_${NOME_PROVA}`;

const STORAGE_PROVAS =
`provas_salvas_${NOME_PROVA}`;

/* =========================================
SALVAR
========================================= */

function salvarProgresso(){

localStorage.setItem(STORAGE_KEY, JSON.stringify({

questaoAtual,
acertos,
erros,
statusQuestoes,
respostasUsuario,
questoesRespondidas,
marcasTexto

}));

}

/* =========================================
CARREGAR
========================================= */

function carregarProgresso(){

const dados =
localStorage.getItem(STORAGE_KEY);

if(!dados) return;

const progresso = JSON.parse(dados);

questaoAtual =
progresso.questaoAtual || 0;

acertos =
progresso.acertos || 0;

erros =
progresso.erros || 0;

statusQuestoes =
progresso.statusQuestoes || {};

respostasUsuario =
progresso.respostasUsuario || {};

questoesRespondidas =
progresso.questoesRespondidas || {};

marcasTexto =
progresso.marcasTexto || {};

document.getElementById("acertos")
.innerText = acertos;

document.getElementById("erros")
.innerText = erros;

}

/* =========================================
CARREGAR JSON
========================================= */

fetch("../../conteudo/revalida_2023_1.json")

.then((res) => {
if (!res.ok) throw new Error("Não foi possível carregar as questões desta edição.");
return res.json();
})
.then((data) => {
if (!Array.isArray(data) || !data.length) throw new Error("Esta edição ainda não possui questões cadastradas.");
questoes = data;

/* CARREGA PROGRESSO */

carregarProgresso();

/* GERA GRADE */

gerarGradeQuestoes();

/* MARCA-TEXTO NO ENUNCIADO */

if (!marcaTextoCtrl && window.ProvaMarcaTexto) {
marcaTextoCtrl = ProvaMarcaTexto.attach(
document.getElementById("enunciado"),
{
onChange: function (html) {
marcasTexto[questaoAtual] = html;
salvarProgresso();
},
}
);
}

/* CARREGA QUESTAO */

carregarQuestao();

atualizarProgresso();
})
.catch((err) => {
alert(err.message || "Erro ao carregar o simulado.");
});

/* =========================================
MENU
========================================= */

function abrirMenu(){

let menu =
document.getElementById("menuOpcoes");

menu.style.display =
menu.style.display === "flex"
? "none"
: "flex";

}


/* =========================================
MODOS
========================================= */

function ativarModoProva(){

modoProva = true;

/* ESCONDE ESTATISTICAS */

document.querySelector(".estatisticas")
.style.display = "none";

/* ATUALIZA GRADE */

gerarGradeQuestoes();

/* RECARREGA QUESTAO */

carregarQuestao();

alert("Modo prova ativado");

}

function ativarModoEstudo(){

modoProva = false;

/* MOSTRA ESTATISTICAS */

document.querySelector(".estatisticas")
.style.display = "flex";

/* ATUALIZA GRADE */

gerarGradeQuestoes();

/* RECARREGA QUESTAO */

carregarQuestao();

alert("Modo estudo ativado");

}

/* =========================================
TOGGLE QUESTOES
========================================= */

function toggleGradeQuestoes(){

let grade =
document.getElementById("gradeQuestoes");

let seta =
document.getElementById("setaGrade");

if(grade.style.display === "flex"){

grade.style.display = "none";

seta.style.transform = "rotate(0deg)";

window.RevalidaIcons.setIcon(seta, "chevron-down", 22);

}else{

grade.style.display = "flex";

seta.style.transform = "rotate(180deg)";

window.RevalidaIcons.setIcon(seta, "chevron-up", 22);

}

}

/* =========================================
GERAR GRADE
========================================= */

function gerarGradeQuestoes(){

let html = "";

questoes.forEach((q,index)=>{

let classeStatus = "";

/* =========================================
MODO PROVA
========================================= */

if(modoProva){

if(respostasUsuario[index] !== undefined){

classeStatus = "respondida-prova";

}

/* =========================================
MODO ESTUDO
========================================= */

}else{

if(statusQuestoes[index] === "acertou"){

classeStatus = "acertou";

}

if(statusQuestoes[index] === "errou"){

classeStatus = "errou";

}

}

html += `

<div
class="numero-questao
${index === questaoAtual ? 'ativa' : ''}
${classeStatus}"

onclick="irParaQuestao(${index})">

${q.numero}

</div>

`;

});

document.getElementById("gradeQuestoes")
.innerHTML = html;

}

/* =========================================
IR QUESTAO
========================================= */

function irParaQuestao(index){

questaoAtual = index;

/* FECHA MENU QUESTOES */

document.getElementById("gradeQuestoes")
.style.display = "none";

/* VOLTA ICONE */

window.RevalidaIcons.setIcon(
document.getElementById("setaGrade"),
"chevron-down",
22
);

document.getElementById("setaGrade")
.style.transform = "rotate(0deg)";

/* SALVA */

salvarProgresso();

/* CARREGA */

carregarQuestao();

atualizarProgresso();

}

/* =========================================
PROGRESSO
========================================= */

function atualizarProgresso(){

const total = questoes.length;

if(!total) return;

const respondidas = Object.keys(questoesRespondidas).length;

const pct = Math.round((respondidas / total) * 100);

const label = document.getElementById("progressoLabel");

const pctEl = document.getElementById("progressoPct");

const fill = document.getElementById("progressoFill");

if(label){

label.textContent =
`Questão ${questaoAtual + 1} de ${total} · ${respondidas} respondida(s)`;

}

if(pctEl) pctEl.textContent = `${pct}%`;

if(fill) fill.style.width = `${pct}%`;

const track = fill?.parentElement;

if(track){

track.setAttribute("aria-valuenow", String(pct));

}

}

/* =========================================
CARREGAR QUESTAO
========================================= */

function carregarQuestao(){

selecionada = null;

let q = questoes[questaoAtual];

if(!q) return;

/* VERIFICA SE JA RESPONDEU */

respondida =
questoesRespondidas[questaoAtual]
? true
: false;

/* TITULO */

document.getElementById("tituloQuestao")
.innerHTML =
"QUESTÃO " + q.numero;

/* ENUNCIADO */

const enunciadoBase =
q.pergunta.replace(/\\n/g,"<br>");

document.getElementById("enunciado")
.innerHTML =
marcasTexto[questaoAtual] || enunciadoBase;

/* COMENTARIO */

document.getElementById("comentarioAtual")
.innerHTML =
q.comentario ||
"Comentário não disponível.";

document.getElementById("comentarioAtual")
.style.display = "none";

document.getElementById("btnComentarioAtual")
.style.display = "none";

/* ALTERNATIVAS */

let html = "";

q.alternativas.forEach((alt,index)=>{

html += `

<div class="alternativa"
id="alt-${index}">

<div class="texto-alternativa"
onclick="selecionarAlternativa(${index})">

${alt}

</div>

<button type="button" class="cortar icon-btn icon-only"
onclick="cortarAlternativa(event,${index})"
title="Cortar alternativa"
aria-label="Cortar alternativa">

<span data-icon="scissors" data-icon-size="18"></span>

</button>

</div>

`;

});

document.getElementById("alternativas")
.innerHTML = html;

window.RevalidaIcons.mount(
document.getElementById("alternativas")
);

atualizarProgresso();

/* RESTAURA RESPOSTA */

if(respostasUsuario[questaoAtual] !== undefined){

selecionada =
respostasUsuario[questaoAtual];

const alternativaSalva =
document.getElementById(
`alt-${selecionada}`
);

if(alternativaSalva){

alternativaSalva.classList
.add("selecionada");

}

/* SE JA RESPONDEU */

if(questoesRespondidas[questaoAtual]){

if(!modoProva){

document.querySelectorAll(".alternativa")[q.correta]
.classList.add("correta");

if(selecionada !== q.correta){

document.querySelectorAll(".alternativa")[selecionada]
.classList.add("errada");

}

document.getElementById("btnComentarioAtual")
.style.display = "block";

}

}

}

/* GERA GRADE */

gerarGradeQuestoes();

}

/* =========================================
SELECIONAR
========================================= */

function selecionarAlternativa(index){

/* BLOQUEIA ALTERACAO */

if(respondida) return;

selecionada = index;

/* SALVA RESPOSTA */

respostasUsuario[questaoAtual] = index;

document.querySelectorAll(".alternativa")
.forEach(item=>{

item.classList.remove("selecionada");

});

/* MARCA */

document.getElementById(`alt-${index}`)
.classList.add("selecionada");

/* SALVA */

salvarProgresso();

}

/* =========================================
RESPONDER
========================================= */

function confirmarResposta(){

/* BLOQUEIA RESPOSTA DUPLA */

if(respondida) return;

if(selecionada === null){

alert("Selecione uma alternativa.");

return;

}

respondida = true;

/* MARCA COMO RESPONDIDA */

questoesRespondidas[questaoAtual] = true;

let q = questoes[questaoAtual];

let alternativas =
document.querySelectorAll(".alternativa");

/* MOSTRA CORRETA */

if(!modoProva){

alternativas[q.correta]
.classList.add("correta");

document.getElementById("btnComentarioAtual")
.style.display = "block";

}

/* ACERTO */

if(selecionada === q.correta){

acertos++;

statusQuestoes[questaoAtual] =
"acertou";

document.getElementById("acertos")
.innerText = acertos;

/* ERRO */

}else{

erros++;

statusQuestoes[questaoAtual] =
"errou";

document.getElementById("erros")
.innerText = erros;

if(!modoProva){

alternativas[selecionada]
.classList.add("errada");

}

}

/* HISTORICO */

if(window.RevalidaHistorico){

window.RevalidaHistorico.registrar({

tipo:"questao_respondida",
nomeProva:NOME_PROVA,
numero:q.numero,
acertou:selecionada === q.correta

});

}

/* ATUALIZA */

gerarGradeQuestoes();

/* SALVA */

salvarProgresso();

atualizarProgresso();

}

/* =========================================
COMENTARIO
========================================= */

function toggleComentarioAtual(){

let div =
document.getElementById("comentarioAtual");

div.style.display =
div.style.display === "block"
? "none"
: "block";

}
/* =========================================
TOGGLE COMENTARIO ERRO
========================================= */

function toggleComentarioErro(index){

const div =
document.getElementById(
`comentario-erro-${index}`
);

div.style.display =
div.style.display === "block"
? "none"
: "block";

}
/* =========================================
CORTAR
========================================= */

function cortarAlternativa(event,index){

event.stopPropagation();

/* BLOQUEIA APOS RESPONDER */

if(respondida) return;

document.getElementById(`alt-${index}`)
.classList.toggle("cortada");

}

/* =========================================
TAMANHO TEXTO
========================================= */

function aumentarTexto(){

tamanhoTexto += 2;

document.querySelector(".enunciado")
.style.fontSize =
tamanhoTexto + "px";

}

function diminuirTexto(){

if(tamanhoTexto > 14){

tamanhoTexto -= 2;

document.querySelector(".enunciado")
.style.fontSize =
tamanhoTexto + "px";

}

}

/* =========================================
NAVEGACAO
========================================= */

function proximaQuestao(){

if(questaoAtual < questoes.length - 1){

questaoAtual++;

salvarProgresso();

carregarQuestao();

}

}

function voltarQuestao(){

if(questaoAtual > 0){

questaoAtual--;

salvarProgresso();

carregarQuestao();

}

}

/* =========================================
GRAFICO RESULTADO
========================================= */

function gerarGrafico(){

const respondidas = acertos + erros;

const naoRespondidas = Math.max(
0,
questoes.length - respondidas
);

if(window.ProvaGrafico){

window.ProvaGrafico.render({

acertos,
erros,
naoRespondidas

});

}

}

/* =========================================
FINALIZAR
========================================= */

function finalizarProva(){

/* ESCONDE BOTAO FINALIZAR */

document.getElementById("menuOpcoes")
.style.display = "none";

/* MOSTRA RESULTADOS */

document.getElementById("resultados")
.style.display = "block";

document.querySelector(".questao-box")?.style.setProperty("display","none");
document.querySelector(".navegacao")?.style.setProperty("display","none");
document.getElementById("progressoWrap")?.style.setProperty("display","none");
document.getElementById("gradeQuestoes")?.style.setProperty("display","none");

let total = acertos + erros;

let porcentagemAcertos =
total > 0
? ((acertos / total) * 100).toFixed(1)
: 0;

let porcentagemErros =
total > 0
? ((erros / total) * 100).toFixed(1)
: 0;

/* QUESTOES ERRADAS */

let htmlErros = "";

questoes.forEach((q,index)=>{

if(statusQuestoes[index] === "errou"){

const respostaUsuario =
respostasUsuario[index];

htmlErros += `

<div class="questao-erro-card">

<div class="questao-erro-titulo icon-wrap">
${window.RevalidaIcons.icon("x-circle", { size: 18, class: "icon--danger" })}
Questão ${q.numero}
</div>

<div class="questao-erro-info">

<p>
<b>Sua resposta:</b>
${q.alternativas[respostaUsuario]}
</p>

<br>

<p>
<b>Resposta correta:</b>
${q.alternativas[q.correta]}
</p>

</div>

<button
class="btn-toggle-erro"
onclick="toggleComentarioErro(${index})">

<span data-icon="chevron-down" data-icon-size="16"></span> Ver comentário

</button>

<div
class="comentario-erro"
id="comentario-erro-${index}">

${q.comentario || "Comentário não disponível."}

</div>

</div>

`;

}

});

/* HTML RESULTADO */

const temErros = erros > 0;

document.getElementById("resumoResultado")
.innerHTML = `

<div class="resumo-stats">

<div class="resumo-stat-card acertos">
<span>Acertos</span>
<strong>${acertos}</strong>
<span>${porcentagemAcertos}%</span>
</div>

<div class="resumo-stat-card erros">
<span>Erros</span>
<strong>${erros}</strong>
<span>${porcentagemErros}%</span>
</div>

</div>

<div class="questoes-erradas">

${htmlErros || '<p class="icon-wrap" style="color:#94A3B8;text-align:center;padding:20px;justify-content:center;">' + window.RevalidaIcons.icon("sparkles", { size: 20, class: "icon--accent" }) + ' Você não errou nenhuma questão respondida.</p>'}

</div>

<div class="resultado-acoes">

<button
type="button"
class="btn-responder btn-icon"
onclick="salvarProvaLocal()">
<span data-icon="save" data-icon-size="18"></span> Salvar prova
</button>

${temErros ? `
<button
type="button"
class="btn-flashcard-result btn-icon"
onclick="iniciarCriacaoFlashcards()">
<span data-icon="pen" data-icon-size="18"></span> Criar flashcards dos meus erros
</button>
` : ""}

<a
class="btn-secundario btn-icon"
href="../../pages/provas_salvas.html">
<span data-icon="book" data-icon-size="18"></span> Ir para provas salvas
</a>

</div>

`;

gerarGrafico();

window.RevalidaIcons.mount(
document.getElementById("resumoResultado")
);

/* SCROLL RESULTADO */

document.getElementById("resultados")
.scrollIntoView({
behavior:"smooth"
});

}

/* =========================================
SAIR
========================================= */

function sairProva(){

localStorage.removeItem(STORAGE_KEY);

location.reload();

}

function irHome(){

window.location.href = "../../dashboard.html";

}
/* =========================================
SALVAR PROVA
========================================= */

function salvarProvaLocal(){

const provas =
JSON.parse(
localStorage.getItem("provas_salvas")
|| "[]"
);

/* QUESTOES ERRADAS */

let questoesErradas = [];

questoes.forEach((q,index)=>{

if(statusQuestoes[index] === "errou"){

questoesErradas.push({

numero:q.numero,

enunciado:
q.pergunta || "",

alternativas:
q.alternativas || [],

respostaUsuario:
q.alternativas[
respostasUsuario[index]
],

respostaCorreta:
q.alternativas[q.correta],

comentario:
q.comentario ||
"Comentário não disponível."

});

}

});

const novaProva = {

nomeProva:NOME_PROVA,

data:
new Date().toLocaleString(),

acertos,
erros,

questoesErradas,

respostasUsuario,

statusQuestoes

};

provas.push(novaProva);

localStorage.setItem(
"provas_salvas",
JSON.stringify(provas)
);

if(window.RevalidaHistorico){

window.RevalidaHistorico.registrar({

tipo:"prova_salva",
nomeProva:NOME_PROVA,
acertos,
erros,
total:acertos + erros

});

}

alert("Prova salva! Em Provas salvas você pode criar flashcards analisando cada erro.");

}

/* =========================================
CRIAR FLASHCARDS (ANÁLISE PRÓPRIA)
========================================= */

function iniciarCriacaoFlashcards(){

const errosLista = [];

questoes.forEach((q,index)=>{

if(statusQuestoes[index] !== "errou") return;

errosLista.push({

numero:q.numero,

enunciado:q.pergunta || "",

alternativas:q.alternativas || [],

respostaUsuario:q.alternativas[respostasUsuario[index]],

}

"../../pages/criar_flashcards.html",

);

}


let sintetizador=window.speechSynthesis;
let lendoQuestao=false;
let vocesDisponiveis=[];

function carregarVozes(){
vocesDisponiveis=speechSynthesis.getVoices();
}
carregarVozes();
speechSynthesis.onvoiceschanged=carregarVozes;

function obterVoz(){
const tipo=document.getElementById("tipoVoz")?.value||"feminina";
const pt=vocesDisponiveis.filter(v=>v.lang&&v.lang.toLowerCase().includes("pt"));
if(!pt.length) return null;
if(tipo==="masculina"){
return pt.find(v=>/male|mascul/i.test(v.name))||pt[0];
}
return pt.find(v=>/female|femin/i.test(v.name))||pt[0];
}


function lerQuestao(){
const btn=document.getElementById("btnAudioMini");

if(!window.speechSynthesis){
alert("Seu navegador não suporta leitura de voz.");
return;
}

if(lendoQuestao){
speechSynthesis.cancel();
lendoQuestao=false;
if(btn){
window.RevalidaIcons.setIcon(
document.getElementById("btnAudioIcon"),
"volume",
22
);
btn.classList.remove("lendo");
}
return;
}

const q=questoes[questaoAtual];
if(!q) return;

let texto=(q.pergunta||"")+". ";

(q.alternativas||[]).forEach((alt,index)=>{
const letra=String.fromCharCode(65+index);
texto+=`Alternativa ${letra}. ${alt}. `;
});

const fala=new SpeechSynthesisUtterance(texto);
fala.lang="pt-BR";
fala.rate=1;
fala.pitch=1;
fala.volume=1;

const voz=vocesDisponiveis.find(v=>v.lang && v.lang.toLowerCase().includes("pt"));
if(voz) fala.voice=voz;

fala.onend=()=>{
lendoQuestao=false;
if(btn){
window.RevalidaIcons.setIcon(
document.getElementById("btnAudioIcon"),
"volume",
22
);
btn.classList.remove("lendo");
}
};

speechSynthesis.cancel();
speechSynthesis.speak(fala);

lendoQuestao=true;
if(btn){
window.RevalidaIcons.setIcon(
document.getElementById("btnAudioIcon"),
"square",
22
);
btn.classList.add("lendo");
}
}

document.addEventListener("keydown",function(e){
if(e.code==="Space" &&
e.target.tagName!=="INPUT" &&
e.target.tagName!=="TEXTAREA" &&
e.target.tagName!=="SELECT"){
e.preventDefault();
lerQuestao();
}
});

</script>
