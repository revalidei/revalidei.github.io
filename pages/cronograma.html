<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Revalida Premium</title>
<style>
body{margin:0;font-family:Inter,Arial;background:#04130f;color:#fff}
.header{padding:20px;background:#071c17;position:sticky;top:0}
.tabs{display:flex;gap:10px;margin-top:10px}
.tab{padding:10px 16px;border:none;border-radius:10px;cursor:pointer}
.active{background:#22c55e;color:#000}
.page{display:none;padding:20px}.show{display:block}
.card{background:#0b211b;padding:15px;border-radius:16px;margin:10px 0}
input,button{padding:10px;border-radius:8px}
.day{display:flex;justify-content:space-between;align-items:center}
</style>
</head>
<body>
<div class="header">
<h1>Revalida Premium 2026.1</h1>
<div id="countdown"></div>
<div class="tabs">
<button class="tab active" onclick="openTab('reta',this)">🔥 Reta Final</button>
<button class="tab" onclick="openTab('meu',this)">📝 Meu Cronograma</button>
</div>
</div>

<div id="reta" class="page show">
<h2>Cronograma Reta Final</h2>
<div id="listaReta"></div>
</div>

<div id="meu" class="page">
<h2>Meu Cronograma</h2>
<input id="novaMeta" placeholder="Nova meta">
<button onclick="addMeta()">Adicionar</button>
<div id="metas"></div>
</div>

<script>
const provas=[
"Revalida 2013","Revalida 2014","Revalida 2015","Revalida 2016","Revalida 2017",
"Revalida 2020","Revalida 2021","Revalida 2022/1","Revalida 2022/2",
"Revalida 2023/1","Revalida 2023/2","Revalida 2024/1","Revalida 2024/2",
"Revalida 2025/1","Revalida 2025/2","Revisão de erros","Descanso ativo"
];

function openTab(id,el){
document.querySelectorAll('.page').forEach(x=>x.classList.remove('show'));
document.getElementById(id).classList.add('show');
document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
el.classList.add('active');
}

function renderReta(){
const data=JSON.parse(localStorage.getItem('cronograma_2026_1')||'{}');
let html='';
provas.forEach((p,i)=>{
const c=data[i]?.done?'checked':'';
const n=data[i]?.nota||'';
html+=`<div class="card day">
<div><input type="checkbox" ${c} onchange="toggle(${i},this.checked)"> ${p}</div>
<div><input type="number" value="${n}" placeholder="%" onchange="nota(${i},this.value)"></div>
</div>`;
});
document.getElementById('listaReta').innerHTML=html;
}

function toggle(i,v){
let d=JSON.parse(localStorage.getItem('cronograma_2026_1')||'{}');
d[i]=d[i]||{}; d[i].done=v;
localStorage.setItem('cronograma_2026_1',JSON.stringify(d));
}
function nota(i,v){
let d=JSON.parse(localStorage.getItem('cronograma_2026_1')||'{}');
d[i]=d[i]||{}; d[i].nota=v;
localStorage.setItem('cronograma_2026_1',JSON.stringify(d));
}

function addMeta(){
const t=document.getElementById('novaMeta').value.trim();
if(!t)return;
let m=JSON.parse(localStorage.getItem('meu_cronograma')||'[]');
m.push({texto:t,ok:false});
localStorage.setItem('meu_cronograma',JSON.stringify(m));
document.getElementById('novaMeta').value='';
renderMetas();
}

function renderMetas(){
let m=JSON.parse(localStorage.getItem('meu_cronograma')||'[]');
document.getElementById('metas').innerHTML=m.map((x,i)=>
`<div class="card"><input type="checkbox" ${x.ok?'checked':''}
onchange="mark(${i},this.checked)"> ${x.texto}</div>`).join('');
}
function mark(i,v){
let m=JSON.parse(localStorage.getItem('meu_cronograma')||'[]');
m[i].ok=v;
localStorage.setItem('meu_cronograma',JSON.stringify(m));
}

function countdown(){
const prova=new Date('2026-06-07T08:00:00');
const diff=prova-new Date();
const dias=Math.floor(diff/86400000);
document.getElementById('countdown').innerText='Faltam '+dias+' dias para a prova';
}
countdown(); setInterval(countdown,60000);
renderReta(); renderMetas();
</script>
</body>
</html>
