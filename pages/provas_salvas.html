<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="
width=device-width,
initial-scale=1,
maximum-scale=1,
user-scalable=no,
viewport-fit=cover
">

<meta
name="theme-color"
content="#020617">

<meta
name="apple-mobile-web-app-capable"
content="yes">

<meta
name="apple-mobile-web-app-status-bar-style"
content="black-translucent">

<meta
name="mobile-web-app-capable"
content="yes">

<title>Erros • Revalida</title>
<link rel="stylesheet" href="../css/app.css">
<link rel="stylesheet" href="../css/layout.css">
<link rel="stylesheet" href="../css/pages.css">
<link rel="stylesheet" href="../css/icons.css">
<script src="../js/icons.js"></script>

<style>

/* ==================================================
RESET
================================================== */

*{
margin:0;
padding:0;
box-sizing:border-box;

font-family:
Inter,
-apple-system,
BlinkMacSystemFont,
"Segoe UI",
sans-serif;

-webkit-tap-highlight-color:transparent;
}

/* ==================================================
HTML
================================================== */

html{

width:100%;
height:100%;

overflow-x:hidden;

background:#020617;

scroll-behavior:smooth;

-webkit-text-size-adjust:100%;
}

/* ==================================================
BODY
================================================== */

body.page-shell{

width:100%;

min-height:100dvh;

overflow-x:hidden;
overflow-y:auto;

padding-top:0;

padding-left:0;

padding-right:0;

padding-bottom:0;

color:#F8FAFC;

-webkit-overflow-scrolling:touch;
}

/* ==================================================
CONTAINER
================================================== */

body.page-shell .container{

max-width:1100px;

margin:auto;

padding-top:calc(env(safe-area-inset-top) + 12px);

padding-bottom:calc(env(safe-area-inset-bottom) + 20px);
}

/* ==================================================
HEADER
================================================== */

.topo{

position:relative;

z-index:1;

display:flex;

justify-content:space-between;

align-items:center;

gap:14px;

padding:18px;

margin-bottom:20px;

border-radius:28px;

background:
rgba(15,23,42,0.92);

backdrop-filter:blur(16px);

-webkit-backdrop-filter:blur(16px);

border:
1px solid rgba(255,255,255,0.05);

box-shadow:
0 10px 35px rgba(0,0,0,0.25);

flex-shrink:0;
}

/* ==================================================
LOGO
================================================== */

.logo{

font-size:26px;

font-weight:900;

color:#7CFFB2;
}

/* ==================================================
BUTTONS TOP
================================================== */

.topo-botoes{

display:flex;

gap:12px;

flex-wrap:wrap;
}

.btn-topo{

padding:14px 18px;

border:none;

border-radius:18px;

font-weight:800;

cursor:pointer;

transition:0.25s;

font-size:14px;
}

.btn-voltar{

background:#172033;

color:white;
}

.btn-apagar{

background:#3A1C1C;

color:#FF7B7B;
}

.btn-topo:hover{

transform:translateY(-2px);
}

/* ==================================================
LISTA
================================================== */

.lista-provas{

display:flex;

flex-direction:column;

gap:24px;

position:relative;

z-index:0;

padding-top:4px;
}

/* ==================================================
CARD
================================================== */

.prova-card{

background:
rgba(255,255,255,0.03);

backdrop-filter:blur(18px);

-webkit-backdrop-filter:blur(18px);

border:
1px solid rgba(255,255,255,0.05);

border-radius:32px;

padding:26px;

box-shadow:
0 20px 45px rgba(0,0,0,0.25);
}

/* ==================================================
HEADER CARD
================================================== */

.prova-header{

display:flex;

justify-content:space-between;

align-items:center;

gap:16px;

flex-wrap:wrap;
}

.prova-titulo{

font-size:24px;

font-weight:900;

color:#7CFFB2;
}

.prova-data{

font-size:14px;

color:#94A3B8;

margin-top:6px;
}

/* ==================================================
STATS
================================================== */

.stats{

display:flex;

gap:12px;

flex-wrap:wrap;

margin-top:22px;
}

.stat{

padding:14px 18px;

border-radius:18px;

font-weight:800;

font-size:15px;
}

.stat-acertos{

background:#103222;

color:#7CFFB2;
}

.stat-erros{

background:#3A1C1C;

color:#FF7B7B;
}

.stat-total{

background:#172033;

color:#E2E8F0;
}

/* ==================================================
ACOES
================================================== */

.acoes{

display:flex;

gap:12px;

margin-top:24px;

flex-wrap:wrap;

width:100%;
}

.btn-acao{

flex:1 1 auto;

min-width:min(100%,120px);

padding:16px;

border:none;

border-radius:20px;

font-weight:800;

cursor:pointer;

transition:0.25s;

font-size:15px;
}

.btn-detalhes{

background:#7CFFB2;

color:#052E16;
}

.btn-excluir{

background:#3A1C1C;

color:#FF7B7B;
}

.btn-flashcard{

background:
linear-gradient(
135deg,
#6366F1,
#8B5CF6
);

color:#fff;
}

.btn-flashcard:disabled{

opacity:0.45;

cursor:not-allowed;

transform:none !important;
}

.btn-acao:hover{

transform:translateY(-2px);
}

/* ==================================================
DETALHES
================================================== */

.detalhes{

display:none;

width:100%;

max-width:100%;

min-width:0;

margin-top:24px;

padding-top:24px;

border-top:
1px solid rgba(255,255,255,0.06);
}

/* ==================================================
QUESTAO
================================================== */

.questao-erro{

width:100%;

max-width:100%;

min-width:0;

box-sizing:border-box;

background:
rgba(255,255,255,0.03);

border:
1px solid rgba(255,255,255,0.05);

border-radius:26px;

padding:22px;

margin-bottom:22px;
}

.questao-erro-titulo{

display:flex;

align-items:center;

gap:8px;

width:100%;

color:#FF7B7B;

margin-bottom:18px;

font-size:20px;
}

.erro-bloco{

width:100%;

max-width:100%;

margin-bottom:16px;
}

.erro-bloco-label{

display:flex;

align-items:center;

gap:8px;

font-weight:700;

margin-bottom:8px;

color:#E2E8F0;
}

.erro-enunciado,
.erro-texto{

width:100%;

max-width:100%;

min-width:0;

font-size:clamp(15px,2.5vw,17px);

line-height:1.75;

color:#E2E8F0;

word-break:break-word;

overflow-wrap:break-word;

white-space:pre-line;
}

/* ==================================================
ALTERNATIVAS
================================================== */

.alternativas{

display:flex;

flex-direction:column;

gap:12px;

margin-top:18px;

margin-bottom:20px;
}

.alternativa{

padding:16px;

border-radius:18px;

background:
rgba(255,255,255,0.04);

border:
1px solid rgba(255,255,255,0.05);

line-height:1.7;
}

.alternativa.usuario{

border:
1px solid #FF7B7B;

background:
rgba(255,123,123,0.10);
}

.alternativa.correta{

border:
1px solid #7CFFB2;

background:
rgba(124,255,178,0.10);
}

/* ==================================================
COMENTARIO
================================================== */

.btn-comentario{

width:100%;

padding:15px;

margin-top:16px;

border:none;

border-radius:18px;

background:#172033;

color:#7CFFB2;

font-weight:900;

cursor:pointer;

font-size:15px;
}

.comentario{

display:none;

width:100%;

max-width:100%;

min-width:0;

margin-top:16px;

padding:20px;

border-radius:20px;

background:#13261B;

line-height:1.75;

font-size:clamp(15px,2.5vw,17px);

word-break:break-word;

overflow-wrap:break-word;

white-space:pre-line;

border:
1px solid rgba(124,255,178,0.10);
}

/* ==================================================
ANOTACAO
================================================== */

.anotacao{

width:100%;

min-height:160px;

margin-top:18px;

padding:18px;

border:none;

outline:none;

resize:vertical;

border-radius:20px;

background:
rgba(255,255,255,0.04);

color:#F8FAFC;

font-size:15px;

line-height:1.8;

border:
1px solid rgba(255,255,255,0.05);
}

/* ==================================================
SALVAR ANOTACAO
================================================== */

.btn-salvar-anotacao{

width:100%;

margin-top:14px;

padding:16px;

border:none;

border-radius:18px;

background:#7CFFB2;

color:#052E16;

font-weight:900;

cursor:pointer;

font-size:15px;
}

/* ==================================================
VAZIO
================================================== */

.vazio{

text-align:center;

padding:90px 20px;

background:
rgba(255,255,255,0.03);

border-radius:32px;

border:
1px solid rgba(255,255,255,0.05);
}

.vazio h2{

font-size:30px;

margin-bottom:14px;

color:#7CFFB2;
}

.vazio p{

color:#94A3B8;

line-height:1.9;
}

/* ==================================================
RESPONSIVO
================================================== */

@media(max-width:768px){

body.page-shell.page-provas-salvas{

padding-left:
env(safe-area-inset-left, 0px);

padding-right:
env(safe-area-inset-right, 0px);

}

body.page-shell.page-provas-salvas .container{

padding-top:calc(env(safe-area-inset-top) + 6px);

padding-bottom:calc(env(safe-area-inset-bottom) + 20px);

}

.topo{

flex-direction:column;

align-items:stretch;

padding:8px 4px;

border-radius:14px;

margin-bottom:12px;

}

.topo-botoes{

width:100%;

display:grid;

grid-template-columns:1fr 1fr;

gap:10px;

}

.btn-topo{

width:100%;

padding:14px 12px;

font-size:13px;

}

.logo{

font-size:20px;

line-height:1.3;
}

.prova-card{

padding:8px 4px;

border-radius:14px;
}

.prova-header{

flex-direction:column;

align-items:flex-start;
}

.acoes{

flex-direction:column;
}

.btn-acao{

width:100%;
}

.questao-erro{

padding:8px 4px;

border-radius:12px;
}

.alternativa{

padding:10px 6px;
}

.stat{

padding:10px 12px;

font-size:14px;
}

.detalhes{

margin-top:14px;

padding-top:14px;
}

.comentario{

padding:10px 6px;
}

.anotacao{

min-height:140px;

padding:10px 6px;
}

}

/* ==================================================
IOS / ANDROID FIX
================================================== */

input,
textarea,
select,
button{

font-size:16px;

touch-action:manipulation;
}

img{

max-width:100%;

height:auto;

display:block;
}

</style>

<style>html.auth-pending body{visibility:hidden}</style>
<script type="module" src="../js/auth-guard.js"></script>
</head>

<body class="page-shell page-provas-salvas">

<div class="page-container container">

<div class="topo topo-card">

<div class="logo icon-wrap">
<span data-icon="book" data-icon-size="22" data-icon-class="icon--accent"></span>
Erros
</div>

<div class="topo-botoes">

<button
type="button"
class="btn-topo btn-voltar btn-icon"
onclick="voltarPagina()">
<span data-icon="chevron-left" data-icon-size="18"></span> Voltar
</button>

<button
type="button"
class="btn-topo btn-apagar btn-icon"
onclick="apagarTodasProvas()">
<span data-icon="trash" data-icon-size="18"></span> Limpar
</button>

</div>

</div>

<!-- ==================================================
LISTA
================================================== -->

<div
class="lista-provas"
id="listaProvas">

</div>

</div>

<script src="../js/flashcards-deck.js"></script>

<script>

/* ==================================================
LOCAL STORAGE
================================================== */

const provas =
JSON.parse(
localStorage.getItem("provas_salvas")
|| "[]"
);

const lista =
document.getElementById("listaProvas");

function escapeHtml(text){

return String(text ?? "")

.replace(/&/g,"&amp;")

.replace(/</g,"&lt;")

.replace(/>/g,"&gt;")

.replace(/"/g,"&quot;");

}

function formatTextoErro(text){

return escapeHtml(text)
.replace(/\r\n/g,"\n")
.replace(/\n/g,"<br>");

}

function ic(name, size, cls){

return window.RevalidaIcons.icon(name, {
size:size||18,
class:cls||""
});

}

/* ==================================================
SEM PROVAS
================================================== */

if(provas.length === 0){

lista.innerHTML = `

<div class="vazio">

<h2 class="icon-wrap" style="justify-content:center">
${ic("inbox",22,"icon--muted")}
Nenhuma prova salva
</h2>

<p>
Finalize uma prova e clique em
"Salvar prova".
</p>

</div>

`;

window.RevalidaIcons.mount(lista);

}else{

renderizarProvas();

}

/* ==================================================
RENDER
================================================== */

function renderizarProvas(){

let html = "";

provas
.slice()
.reverse()
.forEach((prova,indexReverso)=>{

const index =
provas.length - 1 - indexReverso;

const total =
prova.acertos + prova.erros;

const porcentagem =
total > 0
? ((prova.acertos / total) * 100).toFixed(1)
: 0;

let errosHtml = "";

if(prova.questoesErradas){

prova.questoesErradas.forEach((erro,i)=>{

errosHtml += `

<div class="questao-erro">

<h3 class="questao-erro-titulo">
<span class="icon-wrap">${ic("x-circle",18,"icon--danger")}</span>
<span>Questão ${escapeHtml(String(erro.numero))}</span>
</h3>

<div class="erro-bloco">
<div class="erro-bloco-label icon-wrap">${ic("file-text",16)} Enunciado</div>
<div class="erro-enunciado">${formatTextoErro(erro.enunciado || "Não informado")}</div>
</div>

<div class="alternativas">

${(erro.alternativas || []).map(alternativa => `

<div class="
alternativa

${alternativa === erro.respostaUsuario
? 'usuario'
: ''}

${alternativa === erro.respostaCorreta
? 'correta'
: ''}

">

${formatTextoErro(alternativa)}

</div>

`).join("")}

</div>

<div class="erro-bloco">
<div class="erro-bloco-label icon-wrap">${ic("x",16,"icon--danger")} Sua resposta</div>
<div class="erro-texto">${formatTextoErro(erro.respostaUsuario || "Não informado")}</div>
</div>

<div class="erro-bloco">
<div class="erro-bloco-label icon-wrap">${ic("check",16,"icon--accent")} Resposta correta</div>
<div class="erro-texto">${formatTextoErro(erro.respostaCorreta || "Não informado")}</div>
</div>

<button
type="button"
class="btn-comentario btn-icon"
onclick="toggleComentario('${index}-${i}')">
${ic("chevron-down",16)} Ver comentário
</button>

<div
class="comentario"
id="comentario-${index}-${i}">

${formatTextoErro(erro.comentario || "Sem comentário")}

</div>

<textarea
class="anotacao"
id="anotacao-${index}-${i}"
placeholder="Escreva por que você errou esta questão...">${erro.anotacao || ""}</textarea>

<button
type="button"
class="btn-salvar-anotacao btn-icon"
onclick="salvarAnotacao(${index},${i})">
${ic("save",18)} Salvar anotação
</button>

<button
type="button"
class="btn-salvar-anotacao btn-icon"
style="margin-top:10px;background:linear-gradient(135deg,#6366F1,#8B5CF6);color:#fff;"
onclick="criarMeusFlashcards(${index},${i})">
${erro.flashcard?.pergunta ? ic("pen",18) + " Editar meu flashcard" : ic("brain",18) + " Criar meu flashcard"}
</button>

${erro.flashcard?.pergunta ? `
<p class="icon-wrap" style="margin-top:12px;font-size:13px;color:#7CFFB2;line-height:1.6">
${ic("check",16,"icon--accent")} Card salvo: "${escapeHtml((erro.flashcard.pergunta || "").slice(0, 60))}${(erro.flashcard.pergunta || "").length > 60 ? "…" : ""}"
</p>
` : ""}

</div>

`;

});

}

html += `

<div class="prova-card">

<div class="prova-header">

<div>

<div class="prova-titulo icon-wrap">
${ic("book",20,"icon--accent")}
${prova.nomeProva || `Prova ${index + 1}`}
</div>

<div class="prova-data icon-wrap">
${ic("calendar",16,"icon--muted")}
${prova.data || "Sem data"}
</div>

</div>

</div>

<div class="stats">

<div class="stat stat-acertos icon-wrap">
${ic("check",16,"icon--accent")}
${prova.acertos || 0} acertos
</div>

<div class="stat stat-erros icon-wrap">
${ic("x",16,"icon--danger")}
${prova.erros || 0} erros
</div>

<div class="stat stat-total icon-wrap">
${ic("bar-chart",16)}
${porcentagem}%
</div>

</div>

<div class="acoes">

<button
type="button"
class="btn-acao btn-detalhes btn-icon"
onclick="toggleDetalhes(${index})">
${ic("list",18)} Ver erros
</button>

<button
type="button"
class="btn-acao btn-flashcard btn-icon"
onclick="criarMeusFlashcards(${index})"
${(prova.questoesErradas && prova.questoesErradas.length) ? "" : "disabled title=\"Nenhuma questão errada\""}>
${ic("pen",18)} Criar meus flashcards
</button>

<button
type="button"
class="btn-acao btn-excluir btn-icon"
onclick="excluirProva(${index})">
${ic("trash",18)} Excluir
</button>

</div>

<div
class="detalhes"
id="detalhes-${index}">

${errosHtml || `

<p style="
color:#94A3B8;
line-height:1.8;
">

${ic("sparkles",18,"icon--accent")} Nenhuma questão errada nesta prova.

</p>

`}

</div>

</div>

`;

});

lista.innerHTML = html;

window.RevalidaIcons.mount(lista);

}

/* ==================================================
DETALHES
================================================== */

function toggleDetalhes(index){

const div =
document.getElementById(
`detalhes-${index}`
);

div.style.display =
div.style.display === "block"
? "none"
: "block";

}

/* ==================================================
COMENTARIO
================================================== */

function toggleComentario(id){

const div =
document.getElementById(
`comentario-${id}`
);

div.style.display =
div.style.display === "block"
? "none"
: "block";

}

/* ==================================================
SALVAR ANOTACAO
================================================== */

function salvarAnotacao(
provaIndex,
questaoIndex
){

const textarea =
document.getElementById(
`anotacao-${provaIndex}-${questaoIndex}`
);

provas[provaIndex]
.questoesErradas[questaoIndex]
.anotacao = textarea.value;

localStorage.setItem(
"provas_salvas",
JSON.stringify(provas)
);

alert("Anotação salva!");

}

/* ==================================================
CRIAR FLASHCARDS (ANÁLISE PRÓPRIA)
================================================== */

function criarMeusFlashcards(provaIndex, questaoInicio){

const prova = provas[provaIndex];

if(!prova?.questoesErradas?.length){

alert("Esta prova não tem questões erradas para analisar.");

return;

}

const inicio =
typeof questaoInicio === "number"
? questaoInicio
: 0;

window.RevalidaFlashcards.goToCriar(
"criar_flashcards.html",
{
provaIndex,
questao: inicio
}
);

}

/* ==================================================
EXCLUIR PROVA
================================================== */

function excluirProva(index){

if(!confirm(
"Deseja excluir esta prova?"
)) return;

provas.splice(index,1);

localStorage.setItem(
"provas_salvas",
JSON.stringify(provas)
);

location.reload();

}

/* ==================================================
APAGAR TODAS
================================================== */

function apagarTodasProvas(){

if(!confirm(
"Apagar todas as provas salvas?"
)) return;

localStorage.removeItem(
"provas_salvas"
);

location.reload();

}

/* ==================================================
VOLTAR
================================================== */

function voltarPagina(){

history.back();

}

/* ==================================================
IOS FIX
================================================== */

document.addEventListener(
"gesturestart",
function(e){

e.preventDefault();

}
);

</script>

</body>
</html>
